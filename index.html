<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mascot AR</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      text-align: center;
    }
    h1 {
      margin: 20px 0 8px;
      font-size: 28px;
      color: #111;
    }
    p {
      margin: 0 16px 12px;
      color: #555;
      font-size: 16px;
    }
    model-viewer {
      width: 100%;
      height: 78vh;
      background: #ffffff;
    }
    #ar-button {
      background: #111;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Mascot 3D</h1>
  <p>Bấm nút bên dưới để xem mascot ngoài không gian thật</p>

  <model-viewer
    src="./mascot.glb"
    alt="Mascot 3D"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    autoplay
    shadow-intensity="1"
    exposure="1">

    <button slot="ar-button" id="ar-button">
      Xem AR
    </button>
  </model-viewer>
</body>
</html>
